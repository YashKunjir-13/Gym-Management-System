{% extends 'navigationbar.html' %}
{% load static %}
{% block body %}

{% if error == "yes" %}
<script>
    alert('Invalid Login Credentials, Try again');
</script>
{% endif %}

<div class="container" style="margin-top:100px">
    <h2 class="text-center text-primary font-weight-bold">Login</h2>

    <form method="POST">
        {% csrf_token %}
        <label><b>Username</b></label>
        <input type="text" placeholder="Enter Username" name="uname" required class="form-control">

        <label><b>Password</b></label>
        <input type="password" placeholder="Enter Password" name="password" required class="form-control">
        <br>

        <input type="submit" value="Login" class="form-control btn btn-primary">
    </form>
</div>


{% endblock %}
