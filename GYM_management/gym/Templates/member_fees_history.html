{% extends 'navigationbar.html' %}
{% block body %}

<div class="container" style="margin-top:100px">
    <h3 class="text-center text-primary font-weight-bold">
        Fees History - {{ member.name }}
    </h3>

    <table class="table table-bordered table-hover">
        <thead>
            <tr>
                <th>Month</th>
                <th>Amount</th>
                <th>Paid On</th>
                <th>Note</th>
            </tr>
        </thead>

        <tbody>
        {% for f in fees %}
        <tr>
            <td>{{ f.month }}</td>
            <td>₹{{ f.amount }}</td>
            <td>{{ f.paid_on }}</td>
            <td>{{ f.note }}</td>
        </tr>
        {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
