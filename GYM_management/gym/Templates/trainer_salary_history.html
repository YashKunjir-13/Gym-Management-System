{% extends 'navigationbar.html' %}
{% block body %}

<div class="container" style="margin-top:100px">

    <h2 class="text-primary text-center font-weight-bold">
        Salary History - {{ trainer.name }}
    </h2>

    <table class="table table-bordered table-hover">
        <thead>
            <tr>
                <th>Month</th>
                <th>Amount</th>
                <th>Paid On</th>
                <th>Note</th>
            </tr>
        </thead>

        <tbody>
            {% for s in salary %}
            <tr>
                <td>{{ s.month }}</td>
                <td>₹{{ s.amount }}</td>
                <td>{{ s.paid_on }}</td>
                <td>{{ s.note }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
