{% extends 'navigationbar.html' %}
{% load static %}
{% block body %}


<div class="container" style="margin-top:100px">
    <h2 class="text-center text-primary font-weight-bold">Add Member</h2>

    <form method="POST">
        {% csrf_token %}

        <label><b>Name</b></label>
        <input type="text" placeholder=" Name" name="name" required class="form-control">

        <label><b>Contact</b></label>
        <input type="number" placeholder="contact" name="contact" required class="form-control">

        <label><b>Age</b></label>
        <input type="number" placeholder=" Age" name="age" required class="form-control">

        <label><b>Gender</b></label>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
        <br>

        <label><b>Plan Name</b></label>
        <select name="plan" required class="form-control">
            {% for i in plan %}
            <option value="{{ i.id }}">{{ i.name }}</option>
            {% endfor %}
        </select>

        <label><b>Joining_date</b></label>
        <input type="date" placeholder="Joining_date " name="join_date" required class="form-control">

        <label><b>Renewal_date</b></label>
        <input type="date" placeholder="Renewal_date" name="renewal" required class="form-control">

        <label><b>Amount(Rs)</b></label>
        <input type="number" placeholder=" Amount(Rs)" name="amount" required class="form-control">

        <label><b>Plan_Duration(Months)</b></label>
        <input type="number" placeholder="Plan_Duration(Months)" name="duration" required class="form-control">

        <label><b>Pending Amount</b></label>
        <input type="number" placeholder=" Pending Amount" name="pending_amount">

        <br>

        <input type="submit" value="submit" class="form-control btn btn-primary">
    </form>
</div>


{% if error == "no" %}
<script>
    alert('Record save successfully');
    window.location = "{% url 'view_member' %}";
</script>
{% endif %}

{% if error == "yes" %}
<script>
    alert('Something went wrong, Try again');
</script>
{% endif %}

{% endblock %}
